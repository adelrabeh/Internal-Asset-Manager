kind = "web"
previewPath = "/"
title = "OCR Enterprise Dashboard"
version = "1.0.0"
id = "artifacts/ocr-dashboard"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18689

[services.development]
run = "pnpm --filter @workspace/ocr-dashboard run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ocr-dashboard", "run", "build" ]
publicDir = "artifacts/ocr-dashboard/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18689"
BASE_PATH = "/"
